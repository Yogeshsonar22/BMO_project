server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bmo_accounts?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

aws:
  s3:
    bucket-name: bmo-statements
    region: us-east-1
