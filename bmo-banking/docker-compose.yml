version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: bmo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bmo_accounts
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - bmo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  eureka-server:
    build: ./eureka-server
    container_name: bmo-eureka
    ports:
      - "8761:8761"
    networks:
      - bmo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  config-server:
    build: ./config-server
    container_name: bmo-config
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - bmo-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin123@eureka-server:8761/eureka/

  api-gateway:
    build: ./api-gateway
    container_name: bmo-gateway
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - eureka-server
    networks:
      - bmo-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin123@eureka-server:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888

  account-service:
    build: ./account-service
    container_name: bmo-account
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      - bmo-network
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin123@eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/bmo_accounts?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

  transaction-service:
    build: ./transaction-service
    container_name: bmo-transaction
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      account-service:
        condition: service_started
    networks:
      - bmo-network
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin123@eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/bmo_transactions?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

  payment-service:
    build: ./payment-service
    container_name: bmo-payment
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      account-service:
        condition: service_started
    networks:
      - bmo-network
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin123@eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/bmo_payments?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - AWS_REGION=us-east-1

  notification-service:
    build: ./notification-service
    container_name: bmo-notification
    ports:
      - "8084:8084"
    depends_on:
      - config-server
      - eureka-server
    networks:
      - bmo-network
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://admin:admin123@eureka-server:8761/eureka/
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - AWS_REGION=us-east-1

networks:
  bmo-network:
    driver: bridge

volumes:
  mysql_data:
